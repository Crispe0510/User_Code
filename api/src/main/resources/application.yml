spring:
  application:
    name: wy-api
  profiles:
    # 默认本地开发；生产部署请使用 --spring.profiles.active=prod 或环境变量 SPRING_PROFILES_ACTIVE=prod
    active: prod
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  web:
    resources:
      static-locations: classpath:/static/,file:uploads/

server:
  port: 8791

upload:
  dir: uploads

deepseek:
  api-key: sk-92d2e190f13449fb87eb975c0655e4a0
  api-url: https://api.deepseek.com/chat/completions
  model: deepseek-chat
  max-tokens: 500

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    root: info
